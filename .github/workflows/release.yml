name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run pytest

  release:
    name: Release
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency: release
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx python-semantic-release version --push

      - name: Check if version is published on PyPI
        id: pypi_check
        run: |
          VERSION=$(uvx python-semantic-release version --print)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if curl -sf "https://pypi.org/pypi/kelet/$VERSION/json" > /dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.pypi_check.outputs.published == 'false'
        run: uv build

      - name: Publish to PyPI
        if: steps.pypi_check.outputs.published == 'false'
        run: uv publish --trusted-publishing always
